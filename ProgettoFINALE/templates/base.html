<!-- Samuel Panetto, Riccardo Gioia, Lorenzo Stagno - 4C INFO Sierpinski -->

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Frattali{% endblock %}</title>
    <!-- Carichiamo il CSS generale che dà lo stile a tutto il sito -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- Barra di navigazione superiore: rimane fissa in tutte le pagine -->
<nav>
    <!-- Usiamo url_for per assicurarci che i link funzionino sempre tra le cartelle -->
    <a href="{{ url_for('home') }}">HOME</a>
    <a href="{{ url_for('frattale') }}">SIERPINSKI</a>
    <a href="{{ url_for('generatore') }}">GENERATORE</a>
    <a href="{{ url_for('archivio') }}">ARCHIVIO</a>
</nav>

<!-- Questo è il blocco dove verranno inseriti i contenuti delle altre pagine -->
{% block content %}{% endblock %}

<!-- Footer finale con i crediti del progetto e i componenti del team -->
<footer>
    <div class="footer-contenuto">
        <div class="footer-titolo">
            <h3>Algoritmo di Sierpinski</h3>
        </div>

        <!-- Sezione con le card dei creatori del progetto -->
        <div class="footer-team">
            <!-- Card Samuel: responsabile della logica del server -->
            <div class="footer-card">
                <div class="footer-avatar">SP</div>
                <h4>Samuel Panetto</h4>
                <p>Backend</p>
            </div>

            <!-- Card Riccardo: responsabile dell'algoritmo matematico -->
            <div class="footer-card">
                <div class="footer-avatar">GR</div>
                <h4>Gioia Riccardo</h4>
                <p>Python</p>
            </div>

            <!-- Card Lorenzo: responsabile del design e dell'interfaccia -->
            <div class="footer-card">
                <div class="footer-avatar">LS</div>
                <h4>Lorenzo Stagno</h4>
                <p>Frontend</p>
            </div>
        </div>
    </div>
</footer>

</body>
</html>
