<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Fractal Web App{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
</head>
<body>
    <header class="site-header">
        <div class="container nav-wrap">
            <a href="{{ url_for('home') }}" class="brand">
                <span class="brand-badge">△</span>
                <div>
                    <h1 class="logo">Fractal Web App</h1>
                    <p class="logo-subtitle">Triangolo di Sierpinski · Chaos Game</p>
                </div>
            </a>

            <nav>
                <ul class="nav-links">
                    <li><a href="{{ url_for('home') }}">Home</a></li>
                    <li><a href="{{ url_for('frattale') }}">Triangolo di Sierpinski</a></li>
                    <li><a href="{{ url_for('generatore') }}">Il mio frattale</a></li>
                    <li><a href="{{ url_for('archivio') }}">Archivio</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container page-content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
